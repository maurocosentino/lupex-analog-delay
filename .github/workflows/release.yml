name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            artifact: Lupex-Linux-VST3
          - os: windows-latest
            name: Windows
            artifact: Lupex-Windows-VST3

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libfreetype-dev \
            libfontconfig-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libglu1-mesa-dev \
            mesa-common-dev \
            ninja-build

      - name: Configure (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Zip artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd build/LupexDelay_artefacts/Release/VST3
          zip -r ${{ matrix.artifact }}.zip "Lupex Delay.vst3"
          mv ${{ matrix.artifact }}.zip ${{ github.workspace }}/

      - name: Zip artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path "build/LupexDelay_artefacts/Release/VST3/Lupex Delay.vst3" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Lupex-Linux-VST3/Lupex-Linux-VST3.zip
            Lupex-Windows-VST3/Lupex-Windows-VST3.zip
          token: ${{ secrets.GITHUB_TOKEN }}